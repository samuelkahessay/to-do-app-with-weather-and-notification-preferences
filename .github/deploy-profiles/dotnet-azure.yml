# Deploy Profile: .NET on Azure App Service — Phase 6 (coming soon)
# Read by prd-decomposer and repo-assist to configure CI/CD for this stack.
stack: dotnet
name: ".NET + Azure App Service"

detect:
  files: ["*.sln", "*.csproj"]

build:
  runtime: dotnet
  runtime_version: "10.0.x"
  restore: "dotnet restore ${solution_file}"
  build: "dotnet build ${solution_file} --no-restore -c Release"
  test: "dotnet test ${solution_file} --no-build -c Release --verbosity normal"
  publish: "dotnet publish ${main_project} --no-build -c Release -o ./publish"

deploy:
  workflow: deploy-azure.yml  # TODO: Create deploy-azure.yml workflow
  method: "Azure App Service via OIDC"
  secrets:
    - AZURE_CLIENT_ID  # TODO: Configure in repository secrets
    - AZURE_TENANT_ID  # TODO: Configure in repository secrets
    - AZURE_SUBSCRIPTION_ID  # TODO: Configure in repository secrets

ci:
  workflow: dotnet-ci.yml  # TODO: Create dotnet-ci.yml workflow
  name: ".NET CI"
