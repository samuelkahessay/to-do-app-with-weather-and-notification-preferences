#
# Deploy to Vercel — Builds and deploys to Vercel.
# Works for Express/Node.js APIs (api/index.ts) and Next.js apps.
# Called by deploy-router.yml when the active profile matches *-vercel.
#
# Auto-creates the Vercel project on first deploy via `vercel link --yes`.
#
# Prerequisites:
#   - VERCEL_TOKEN secret (API token from vercel.com/account/tokens)
#   - vercel.json in repo root
#

name: Deploy to Vercel

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Link Vercel project
        run: vercel link --yes --token=$VERCEL_TOKEN

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "Deployed to: $URL"
